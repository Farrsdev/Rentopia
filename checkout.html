<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Pembayaran - Rentopia</title>
    <meta name="description" content="Selesaikan pembayaran Anda untuk menyewa produk pilihan.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen antialiased flex flex-col selection:bg-blue-100 selection:text-blue-900">

    <!-- Header Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <a href="landing.html" class="flex items-center gap-2 group">
                        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-md shadow-blue-600/20 group-hover:scale-105 transition-transform">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <span class="text-xl font-extrabold font-outfit text-gray-900 tracking-tight">Rentopia</span>
                    </a>
                </div>

                <!-- Navigation Center (Logged In Only) -->
                <div id="nav-center" class="hidden md:flex items-center gap-2">
                    <a href="katalog.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors">Katalog</a>
                    <a href="cart.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors relative">
                        Keranjang
                        <span id="cart-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-blue-600 rounded-full text-[10px] font-bold text-white flex items-center justify-center">0</span>
                    </a>
                    <a href="penyewaan.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors">Penyewaan Saya</a>
                </div>

                <!-- Auth panel (Right) -->
                <div id="auth-panel" class="flex items-center gap-3">
                    <!-- Loaded dynamically via JS -->
                </div>

                <!-- Mobile menu button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white absolute w-full shadow-lg">
            <div class="px-4 py-3 space-y-1" id="mobile-nav-links">
                <!-- Loaded dynamically via JS -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 animate-fade-in w-full">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold font-outfit text-gray-900 mb-2 tracking-tight">Checkout Pembayaran</h1>
            <p class="text-gray-500">Selesaikan pembayaran Anda untuk menyewa produk pilihan.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Order Summary (Left/Bottom) -->
            <div class="lg:col-span-1 order-2 lg:order-1">
                <div class="bg-gray-50 border border-gray-200 rounded-3xl p-6 shadow-sm sticky top-24">
                    <h3 class="text-lg font-bold text-gray-900 mb-4 font-outfit">Ringkasan Pesanan</h3>
                    <div class="space-y-4 mb-6" id="order-summary-list">
                        <!-- Loaded dynamically -->
                    </div>
                    <div class="pt-4 border-t border-gray-200 flex justify-between items-center">
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-wide">Total Pembayaran</p>
                        <p class="text-xl font-extrabold text-blue-600" id="total-price">Rp 0</p>
                    </div>
                </div>
            </div>

            <!-- Payment Form (Right/Top) -->
            <div class="lg:col-span-2 order-1 lg:order-2">
                <div class="bg-white border border-gray-200 rounded-3xl p-6 md:p-8 shadow-sm">
                    <form id="checkout-form">
                        
                        <!-- Payment Methods Selection -->
                        <div class="mb-8">
                            <h3 class="text-lg font-bold text-gray-900 mb-4 font-outfit">Pilih Metode Pembayaran</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <label class="relative cursor-pointer">
                                    <input type="radio" name="metode_pembayaran" value="Bank BCA" class="peer sr-only" checked>
                                    <div class="p-4 rounded-xl border-2 border-gray-200 hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all h-full">
                                        <div class="flex items-center justify-between mb-2">
                                            <p class="font-bold text-gray-900 text-sm">Bank BCA</p>
                                            <svg class="w-5 h-5 text-blue-500 hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                        </div>
                                        <p class="text-sm text-gray-600 font-mono">1234567890</p>
                                        <p class="text-xs text-gray-500 mt-1">A.N Rentopia Corp</p>
                                    </div>
                                </label>
                                
                                <label class="relative cursor-pointer">
                                    <input type="radio" name="metode_pembayaran" value="Bank Mandiri" class="peer sr-only">
                                    <div class="p-4 rounded-xl border-2 border-gray-200 hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all h-full">
                                        <div class="flex items-center justify-between mb-2">
                                            <p class="font-bold text-gray-900 text-sm">Bank Mandiri</p>
                                            <svg class="w-5 h-5 text-blue-500 hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                        </div>
                                        <p class="text-sm text-gray-600 font-mono">0987654321</p>
                                        <p class="text-xs text-gray-500 mt-1">A.N Rentopia Corp</p>
                                    </div>
                                </label>

                                <label class="relative cursor-pointer">
                                    <input type="radio" name="metode_pembayaran" value="GoPay" class="peer sr-only">
                                    <div class="p-4 rounded-xl border-2 border-gray-200 hover:bg-gray-50 peer-checked:border-blue-500 peer-checked:bg-blue-50 transition-all h-full">
                                        <div class="flex items-center justify-between mb-2">
                                            <p class="font-bold text-gray-900 text-sm">GoPay / e-Wallet</p>
                                            <svg class="w-5 h-5 text-blue-500 hidden peer-checked:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                            </svg>
                                        </div>
                                        <p class="text-sm text-gray-600 font-mono">0812 3456 7890</p>
                                        <p class="text-xs text-gray-500 mt-1">A.N Rentopia</p>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <!-- Upload Proof of Transfer -->
                        <div class="mb-8">
                            <h3 class="text-lg font-bold text-gray-900 mb-4 font-outfit">Upload Bukti Transfer</h3>
                            <div class="w-full">
                                <label for="bukti_transfer" class="block w-full px-4 py-8 border-2 border-dashed border-gray-300 rounded-2xl text-center cursor-pointer hover:bg-gray-50 hover:border-blue-500 transition-colors" id="upload-label">
                                    <svg class="w-8 h-8 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                                    </svg>
                                    <span class="text-sm font-medium text-gray-900 block" id="upload-text">Klik untuk upload struk / screenshot</span>
                                    <span class="text-xs text-gray-500 mt-1 block">PNG, JPG, JPEG (Max 2MB)</span>
                                    <input type="file" id="bukti_transfer" class="hidden" accept="image/png, image/jpeg, image/jpg" required>
                                </label>
                            </div>
                        </div>

                        <!-- Submit Buttons -->
                        <div class="pt-6 border-t border-gray-100 flex items-center justify-between gap-4">
                            <a href="cart.html" class="px-6 py-3 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition">Kembali</a>
                            <button type="submit" id="submit-btn" class="px-8 py-3 bg-blue-600 text-white text-sm font-bold rounded-xl hover:bg-blue-700 transition shadow-sm active:scale-95 flex items-center gap-2">
                                <span>Kirim & Buat Pesanan</span>
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <span class="font-bold font-outfit text-gray-900 tracking-tight">Rentopia</span>
                </div>
                <p id="copyright" class="text-sm text-gray-500">&copy; 2026 Rentopia. Aplikasi penyewaan digital modern.</p>
            </div>
        </div>
    </footer>

    <script>
        // Init Mock Data
        const initialProducts = [
            { id: 1, nama_produk: "Minecraft Bedrock Edition", kategori: "game", harga_sewa: 15000, stok: 8, deskripsi: "Game sandbox legendaris di mana Anda dapat menjelajah dunia tak terbatas, membangun rumah, hingga bertarung melawan Ender Dragon.", gambar: "https://images.unsplash.com/photo-1605901309584-818e25960a8f?auto=format&fit=crop&q=80&w=400" },
            { id: 2, nama_produk: "GTA San Andreas Definitive", kategori: "game", harga_sewa: 25000, stok: 5, deskripsi: "Nikmati petualangan Carl Johnson di Los Santos dengan grafis yang ditingkatkan dan kontrol ala GTA V.", gambar: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400" },
            { id: 3, nama_produk: "FL Studio Mobile", kategori: "android", harga_sewa: 30000, stok: 12, deskripsi: "Buat dan simpan proyek musik multi-track lengkap di ponsel atau tablet Android Anda.", gambar: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=400" },
            { id: 4, nama_produk: "Adobe Lightroom Premium", kategori: "android", harga_sewa: 20000, stok: 20, deskripsi: "Aplikasi editor foto tangguh dengan preset premium, healing brush, dan kontrol warna presisi.", gambar: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=400" },
            { id: 5, nama_produk: "Stardew Valley", kategori: "game", harga_sewa: 12000, stok: 3, deskripsi: "Bangun perkebunan impian Anda, pelihara hewan, bersosialisasi dengan penduduk desa, dan selidiki misteri lembah.", gambar: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?auto=format&fit=crop&q=80&w=400" },
            { id: 6, nama_produk: "Nova Launcher Prime", kategori: "android", harga_sewa: 8000, stok: 15, deskripsi: "Kustomisasi layar beranda Android Anda tanpa batas dengan gestures, efek transisi, dan icon pack.", gambar: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&q=80&w=400" }
        ];

        // Retrieve mock data
        const products = JSON.parse(localStorage.getItem('rentopia_products')) || initialProducts;
        const user = JSON.parse(localStorage.getItem('rentopia_user'));
        let cart = JSON.parse(localStorage.getItem('rentopia_cart') || '[]');
        const checkedItemIds = JSON.parse(localStorage.getItem('rentopia_checkout_items') || '[]');

        // Auth and Cart Gate
        if (!user) {
            window.location.href = "index.html";
        }
        if (checkedItemIds.length === 0) {
            window.location.href = "cart.html";
        }

        // Render Navbar and Auth state
        const authPanel = document.getElementById('auth-panel');
        const mobileNavLinks = document.getElementById('mobile-nav-links');

        function updateCartBadge() {
            const cartBadge = document.getElementById('cart-badge');
            if (user && cartBadge) {
                if (cart.length > 0) {
                    cartBadge.textContent = cart.length;
                    cartBadge.classList.remove('hidden');
                } else {
                    cartBadge.classList.add('hidden');
                }
            }
        }

        if (user) {
            const initials = user.name ? user.name.substring(0, 1).toUpperCase() : 'U';
            const roleBadge = user.role === 'admin' ? 'bg-purple-100 text-purple-700 border-purple-200' : 'bg-green-100 text-green-700 border-green-200';
            
            authPanel.innerHTML = `
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-full border border-gray-200">
                    <div class="w-6 h-6 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center text-xs font-bold">${initials}</div>
                    <span class="text-sm font-medium text-gray-700">${user.name}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full font-semibold border ${roleBadge}">${user.role.charAt(0).toUpperCase() + user.role.slice(1)}</span>
                </div>
                <button id="logout-btn" class="p-2 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="Logout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            `;

            updateCartBadge();

            mobileNavLinks.innerHTML = `
                <a href="landing.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50">Beranda</a>
                <a href="katalog.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50">Katalog</a>
                <a href="cart.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600">Keranjang (${cart.length})</a>
                <a href="penyewaan.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600">Penyewaan Saya</a>
                ${user.role === 'admin' ? '<a href="admin-dashboard.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-purple-600 hover:bg-purple-50">Admin Panel</a>' : ''}
            `;

            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('rentopia_user');
                window.location.href = "index.html?logout=success";
            });
        }

        // Toggle Mobile Menu
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // Set Copyright Year
        document.getElementById('copyright').innerHTML = `&copy; ${new Date().getFullYear()} Rentopia. Aplikasi penyewaan digital modern.`;

        // Render Checkout details
        const orderSummaryList = document.getElementById('order-summary-list');
        const totalPriceEl = document.getElementById('total-price');

        let totalAmount = 0;
        const checkoutItemsDetails = []; // To save in the rentals mock list

        cart.forEach(item => {
            if (checkedItemIds.includes(item.id)) {
                const p = products.find(prod => prod.id === item.product_id);
                if (p) {
                    const itemTotal = p.harga_sewa * item.qty;
                    totalAmount += itemTotal;
                    
                    checkoutItemsDetails.push({
                        product_id: p.id,
                        nama_produk: p.nama_produk,
                        harga_sewa: p.harga_sewa,
                        qty: item.qty,
                        link_akses: p.kategori === 'game' ? 'https://rentopia.dummy/download-game' : 'https://rentopia.dummy/download-app'
                    });

                    const summaryItem = document.createElement('div');
                    summaryItem.className = "flex justify-between items-start gap-4";
                    summaryItem.innerHTML = `
                        <div>
                            <p class="text-sm font-semibold text-gray-900">${p.nama_produk}</p>
                            <p class="text-xs text-gray-500">${item.qty}x item</p>
                        </div>
                        <p class="text-sm font-bold text-gray-900">Rp ${itemTotal.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".")}</p>
                    `;
                    orderSummaryList.appendChild(summaryItem);
                }
            }
        });

        totalPriceEl.textContent = 'Rp ' + totalAmount.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        // File upload custom visual feedback
        document.getElementById('bukti_transfer').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                const fileName = e.target.files[0].name;
                const label = document.getElementById('upload-label');
                const text = document.getElementById('upload-text');
                
                text.textContent = fileName;
                text.classList.add('text-blue-600', 'font-semibold');
                label.classList.add('border-blue-500', 'bg-blue-50');
            }
        });

        // Handle Checkout Form Submission
        document.getElementById('checkout-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.querySelector('span').innerHTML = "Memproses Transaksi...";

            // Get selected payment method
            const selectedMethod = document.querySelector('input[name="metode_pembayaran"]:checked').value;

            setTimeout(() => {
                // Fetch existing rentals
                let rentals = JSON.parse(localStorage.getItem('rentopia_rentals') || '[]');
                
                // Construct new rental entry
                const today = new Date();
                const returnDate = new Date();
                returnDate.setDate(today.getDate() + 7); // 7 days lease

                const newRental = {
                    id: Math.floor(1000 + Math.random() * 9000), // Random 4 digit transaction ID
                    created_at: today.toISOString(),
                    tanggal_pinjam: today.toISOString(),
                    tanggal_kembali: returnDate.toISOString(),
                    status: "Menunggu", // Waiting verification
                    metode_pembayaran: selectedMethod,
                    details: checkoutItemsDetails,
                    total: totalAmount
                };

                rentals.unshift(newRental); // Add to the top of the history
                localStorage.setItem('rentopia_rentals', JSON.stringify(rentals));

                // Remove the rented items from the Cart
                const updatedCart = cart.filter(item => !checkedItemIds.includes(item.id));
                localStorage.setItem('rentopia_cart', JSON.stringify(updatedCart));

                // Clear checked items selection
                localStorage.removeItem('rentopia_checkout_items');

                window.location.href = "penyewaan.html?checkout=success";
            }, 1200);
        });
    </script>
</body>
</html>
