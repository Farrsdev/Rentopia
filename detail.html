<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk - Rentopia</title>
    <meta name="description" content="Sewa produk digital premium di Rentopia.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen antialiased flex flex-col selection:bg-blue-100 selection:text-blue-900">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <!-- Header Navbar -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <a href="landing.html" class="flex items-center gap-2 group">
                        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-md shadow-blue-600/20 group-hover:scale-105 transition-transform">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                        </div>
                        <span class="text-xl font-extrabold font-outfit text-gray-900 tracking-tight">Rentopia</span>
                    </a>
                </div>

                <!-- Navigation Center (Logged In Only) -->
                <div id="nav-center" class="hidden md:flex items-center gap-2">
                    <a href="katalog.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors">Katalog</a>
                    <a href="cart.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors relative">
                        Keranjang
                        <span id="cart-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-blue-600 rounded-full text-[10px] font-bold text-white flex items-center justify-center">0</span>
                    </a>
                    <a href="penyewaan.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors">Penyewaan Saya</a>
                </div>

                <!-- Auth panel (Right) -->
                <div id="auth-panel" class="flex items-center gap-3">
                    <!-- Loaded dynamically via JS -->
                </div>

                <!-- Mobile menu button -->
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg text-gray-500 hover:bg-gray-100 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white absolute w-full shadow-lg">
            <div class="px-4 py-3 space-y-1" id="mobile-nav-links">
                <!-- Loaded dynamically via JS -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12 animate-fade-in">
        <a href="katalog.html" class="inline-flex items-center gap-2 text-sm font-medium text-gray-500 hover:text-gray-900 transition mb-6">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Kembali ke Katalog
        </a>

        <div class="bg-white border border-gray-200 rounded-3xl overflow-hidden shadow-sm">
            <div class="md:flex" id="detail-container">
                <!-- Renders dynamically via JS -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <span class="font-bold font-outfit text-gray-900 tracking-tight">Rentopia</span>
                </div>
                <p id="copyright" class="text-sm text-gray-500">&copy; 2026 Rentopia. Aplikasi penyewaan digital modern.</p>
            </div>
        </div>
    </footer>

    <script>
        // Init Mock Data
        const initialProducts = [
            { id: 1, nama_produk: "Minecraft Bedrock Edition", kategori: "game", harga_sewa: 15000, stok: 8, deskripsi: "Game sandbox legendaris di mana Anda dapat menjelajah dunia tak terbatas, membangun rumah, hingga bertarung melawan Ender Dragon.", gambar: "https://images.unsplash.com/photo-1605901309584-818e25960a8f?auto=format&fit=crop&q=80&w=400" },
            { id: 2, nama_produk: "GTA San Andreas Definitive", kategori: "game", harga_sewa: 25000, stok: 5, deskripsi: "Nikmati petualangan Carl Johnson di Los Santos dengan grafis yang ditingkatkan dan kontrol ala GTA V.", gambar: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400" },
            { id: 3, nama_produk: "FL Studio Mobile", kategori: "android", harga_sewa: 30000, stok: 12, deskripsi: "Buat dan simpan proyek musik multi-track lengkap di ponsel atau tablet Android Anda.", gambar: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=400" },
            { id: 4, nama_produk: "Adobe Lightroom Premium", kategori: "android", harga_sewa: 20000, stok: 20, deskripsi: "Aplikasi editor foto tangguh dengan preset premium, healing brush, dan kontrol warna presisi.", gambar: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=400" },
            { id: 5, nama_produk: "Stardew Valley", kategori: "game", harga_sewa: 12000, stok: 3, deskripsi: "Bangun perkebunan impian Anda, pelihara hewan, bersosialisasi dengan penduduk desa, dan selidiki misteri lembah.", gambar: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?auto=format&fit=crop&q=80&w=400" },
            { id: 6, nama_produk: "Nova Launcher Prime", kategori: "android", harga_sewa: 8000, stok: 15, deskripsi: "Kustomisasi layar beranda Android Anda tanpa batas dengan gestures, efek transisi, dan icon pack.", gambar: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&q=80&w=400" }
        ];

        // Retrieve mock data
        const products = JSON.parse(localStorage.getItem('rentopia_products')) || initialProducts;
        const user = JSON.parse(localStorage.getItem('rentopia_user'));
        let cart = JSON.parse(localStorage.getItem('rentopia_cart') || '[]');

        // Parse Product ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id')) || 1; // default to Minecraft
        const product = products.find(p => p.id === productId) || products[0];

        // Render Navbar and Auth state
        const authPanel = document.getElementById('auth-panel');
        const navCenter = document.getElementById('nav-center');
        const mobileNavLinks = document.getElementById('mobile-nav-links');

        function updateCartBadge() {
            const cartBadge = document.getElementById('cart-badge');
            if (user && cartBadge) {
                if (cart.length > 0) {
                    cartBadge.textContent = cart.length;
                    cartBadge.classList.remove('hidden');
                } else {
                    cartBadge.classList.add('hidden');
                }
            }
        }

        if (user) {
            const initials = user.name ? user.name.substring(0, 1).toUpperCase() : 'U';
            const roleBadge = user.role === 'admin' ? 'bg-purple-100 text-purple-700 border-purple-200' : 'bg-green-100 text-green-700 border-green-200';
            
            authPanel.innerHTML = `
                <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-gray-100 rounded-full border border-gray-200">
                    <div class="w-6 h-6 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center text-xs font-bold">${initials}</div>
                    <span class="text-sm font-medium text-gray-700">${user.name}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full font-semibold border ${roleBadge}">${user.role.charAt(0).toUpperCase() + user.role.slice(1)}</span>
                </div>
                <button id="logout-btn" class="p-2 rounded-lg text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="Logout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            `;

            updateCartBadge();

            mobileNavLinks.innerHTML = `
                <a href="landing.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50">Beranda</a>
                <a href="katalog.html" class="block px-4 py-2.5 rounded-lg text-sm font-semibold bg-blue-50 text-blue-600">Katalog</a>
                <a href="cart.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600">Keranjang (${cart.length})</a>
                <a href="penyewaan.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50 hover:text-blue-600">Penyewaan Saya</a>
                ${user.role === 'admin' ? '<a href="admin-dashboard.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-purple-600 hover:bg-purple-50">Admin Panel</a>' : ''}
            `;

            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('rentopia_user');
                window.location.href = "index.html?logout=success";
            });
        } else {
            authPanel.innerHTML = `
                <a href="index.html" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors">Masuk</a>
                <a href="register.html" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-blue-600 text-white hover:bg-blue-700 transition-all shadow-md shadow-blue-600/20 active:scale-95">Daftar Sekarang</a>
            `;

            navCenter.innerHTML = `
                <a href="katalog.html" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors">Katalog</a>
            `;

            mobileNavLinks.innerHTML = `
                <a href="landing.html" class="block px-4 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-blue-50">Beranda</a>
                <a href="katalog.html" class="block px-4 py-2.5 rounded-lg text-sm font-semibold bg-blue-50 text-blue-600">Katalog</a>
                <div class="border-t border-gray-100 my-2 pt-2"></div>
                <a href="index.html" class="block px-4 py-2 rounded-lg text-sm font-semibold text-gray-700 hover:bg-gray-50">Masuk</a>
                <a href="register.html" class="block px-4 py-2 rounded-lg text-sm font-semibold text-blue-600 hover:bg-blue-50">Daftar</a>
            `;
        }

        // Toggle Mobile Menu
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // Set Copyright Year
        document.getElementById('copyright').innerHTML = `&copy; ${new Date().getFullYear()} Rentopia. Aplikasi penyewaan digital modern.`;

        // Toast Helper
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const borderColors = {
                success: 'border-l-emerald-500 border-emerald-100',
                info: 'border-l-blue-500 border-blue-100',
                error: 'border-l-red-500 border-red-100'
            };
            const bgIcons = {
                success: '<svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
                info: '<svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
                error: '<svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>'
            };
            const bgIconCircle = {
                success: 'bg-emerald-100',
                info: 'bg-blue-100',
                error: 'bg-red-100'
            };

            toast.className = `flex items-center gap-3 bg-white text-gray-800 px-6 py-4 rounded-xl shadow-xl border border-l-4 ${borderColors[type]} mb-3 transition-all duration-300 opacity-0 transform translate-y-[-10px]`;
            toast.style.animation = 'slide-in 0.3s ease-out forwards';
            toast.innerHTML = `
                <div class="w-8 h-8 ${bgIconCircle[type]} rounded-full flex items-center justify-center shrink-0">
                    ${bgIcons[type]}
                </div>
                <span class="font-medium text-sm text-left">${message}</span>
                <button type="button" class="ml-2 text-gray-400 hover:text-gray-600 transition" onclick="this.parentElement.remove()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '1';
            }, 50);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Render Product Details
        const detailContainer = document.getElementById('detail-container');
        const badgeColor = product.kategori === 'game' ? 'bg-indigo-50 text-indigo-700 border-indigo-100' : 'bg-emerald-50 text-emerald-700 border-emerald-100';
        const formattedHarga = product.harga_sewa.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        
        detailContainer.innerHTML = `
            <!-- Image Section -->
            <div class="md:w-5/12 bg-gray-50 flex items-center justify-center p-8 border-b md:border-b-0 md:border-r border-gray-100 min-h-[300px]">
                <img src="${product.gambar}" class="rounded-2xl max-h-80 w-full object-cover shadow-sm" alt="${product.nama_produk}">
            </div>

            <!-- Content Section -->
            <div class="md:w-7/12 p-8 lg:p-10 flex flex-col">
                <div class="mb-4">
                    <span class="inline-block px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider ${badgeColor} border mb-3">${product.kategori}</span>
                    <h1 class="text-3xl lg:text-4xl font-extrabold font-outfit text-gray-900 tracking-tight">${product.nama_produk}</h1>
                </div>
                
                <div class="prose prose-sm text-gray-600 mb-8 max-w-none">
                    <p class="leading-relaxed font-sans">${product.deskripsi}</p>
                </div>

                <div class="mt-auto">
                    <div class="flex flex-wrap items-center gap-8 mb-8 p-6 bg-gray-50 rounded-2xl border border-gray-100">
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Harga Sewa</p>
                            <p class="text-3xl font-bold text-blue-600">Rp ${formattedHarga}<span class="text-sm font-semibold text-gray-500">/mgg</span></p>
                        </div>
                        <div class="w-px h-12 bg-gray-200 hidden sm:block"></div>
                        <div>
                            <p class="text-sm font-medium text-gray-500 mb-1">Ketersediaan</p>
                            <div class="flex items-center gap-2">
                                <span class="relative flex h-3 w-3">
                                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${product.stok > 0 ? 'bg-emerald-400' : 'bg-red-400'} opacity-75"></span>
                                    <span class="relative inline-flex rounded-full h-3 w-3 ${product.stok > 0 ? 'bg-emerald-500' : 'bg-red-500'}"></span>
                                </span>
                                <p class="text-xl font-bold ${product.stok > 0 ? 'text-gray-900' : 'text-red-500'}">${product.stok} <span class="text-sm font-medium text-gray-500">stok</span></p>
                            </div>
                        </div>
                    </div>

                    ${product.stok > 0 ? `
                        <form id="add-to-cart-form" class="flex flex-col sm:flex-row items-center gap-4">
                            <div class="w-full sm:w-32 relative">
                                <label class="block text-xs font-semibold text-gray-500 mb-1.5 uppercase tracking-wider">Kuantitas</label>
                                <input type="number" id="qty-input" value="1" min="1" max="${product.stok}"
                                    class="w-full px-4 py-3.5 bg-white border border-gray-200 rounded-xl text-gray-900 text-center font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-shadow">
                            </div>
                            <div class="w-full sm:flex-1 mt-1 sm:mt-[22px]">
                                <button type="submit" class="w-full h-[52px] bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-md shadow-blue-600/20 active:scale-[0.98] flex items-center justify-center gap-2">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
                                    </svg>
                                    Masukkan ke Keranjang
                                </button>
                            </div>
                        </form>
                    ` : `
                        <div class="w-full p-4 bg-red-50 border border-red-100 rounded-xl flex items-center justify-center gap-2">
                            <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <p class="text-red-700 font-semibold">Maaf, produk ini sedang kehabisan stok.</p>
                        </div>
                    `}
                </div>
            </div>
        `;

        // Add to Cart handler
        const form = document.getElementById('add-to-cart-form');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                if (!user) {
                    showToast("Silakan login terlebih dahulu untuk menyewa!", "error");
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);
                    return;
                }

                const qty = parseInt(document.getElementById('qty-input').value) || 1;
                
                const existingItem = cart.find(item => item.product_id === product.id);
                if (existingItem) {
                    if (existingItem.qty + qty > product.stok) {
                        showToast(`Batas maksimal stok sewa untuk ${product.nama_produk} telah tercapai!`, "error");
                        return;
                    }
                    existingItem.qty += qty;
                } else {
                    cart.push({
                        id: new Date().getTime() + Math.random(),
                        product_id: product.id,
                        qty: qty
                    });
                }

                localStorage.setItem('rentopia_cart', JSON.stringify(cart));
                updateCartBadge();
                showToast(`${qty} item ${product.nama_produk} berhasil dimasukkan ke keranjang!`, "success");
            });
        }
    </script>
</body>
</html>
