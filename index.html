<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Rentopia - Platform Penyewaan Aplikasi & Game</title>
    <meta name="description" content="Rentopia - Platform penyewaan game dan aplikasi Android online terpercaya dengan antarmuka modern">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes slide-in {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen antialiased flex flex-col justify-center py-12 sm:px-6 lg:px-8 selection:bg-blue-100 selection:text-blue-900">
    
    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50"></div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md animate-fade-in">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4 shadow-xl shadow-blue-600/20">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold font-outfit text-gray-900 tracking-tight">Selamat Datang</h1>
            <p class="text-gray-500 mt-2">Masuk ke akun Rentopia Anda</p>
        </div>

        <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100 mx-4 sm:mx-0 relative animate-fade-in">
            <!-- Exclamation mark button for mockup mode selection -->
            <div class="absolute top-4 right-4">
                <button type="button" id="role-toggle-btn" class="w-6 h-6 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-400 hover:text-gray-600 flex items-center justify-center text-xs font-extrabold font-sans transition focus:outline-none" title="Pilih Mode Preview">
                    !
                </button>
                <!-- Popup Menu -->
                <div id="role-menu" class="hidden absolute right-0 mt-2 w-48 bg-white border border-gray-200 rounded-xl shadow-lg p-2 z-50 text-xs">
                    <p class="font-semibold text-gray-400 px-2.5 py-1.5 border-b border-gray-100 mb-1 text-left">Mode Preview:</p>
                    <button type="button" onclick="selectRole('pembeli')" class="w-full text-left px-2.5 py-2 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition font-medium flex items-center gap-1.5">
                        🎮 Penyewa (User)
                    </button>
                    <button type="button" onclick="selectRole('admin')" class="w-full text-left px-2.5 py-2 hover:bg-purple-50 hover:text-purple-600 rounded-lg transition font-medium flex items-center gap-1.5">
                        🔑 Admin
                    </button>
                </div>
            </div>

            <form id="login-form" class="space-y-6">
                <input type="hidden" id="login-role" name="role" value="pembeli">

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Alamat Email</label>
                    <input type="email" id="email" required autofocus
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm"
                        placeholder="nama@email.com">
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                        <a href="#" class="text-xs font-semibold text-blue-600 hover:text-blue-700">Lupa password?</a>
                    </div>
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm"
                        placeholder="••••••••">
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    <label for="remember" class="ml-2 block text-sm text-gray-600 cursor-pointer">Ingat saya</label>
                </div>

                <button type="submit" id="btn-submit" class="w-full py-3.5 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-600/20 active:scale-[0.98] flex items-center justify-center gap-2">
                    <span id="btn-text">Masuk</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-500">
                    Belum punya akun? 
                    <a href="register.html" class="font-semibold text-blue-600 hover:text-blue-700 transition">Daftar sekarang</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Init Mock Data
        const initialProducts = [
            { id: 1, nama_produk: "Minecraft Bedrock Edition", kategori: "game", harga_sewa: 15000, stok: 8, deskripsi: "Game sandbox legendaris di mana Anda dapat menjelajah dunia tak terbatas, membangun rumah, hingga bertarung melawan Ender Dragon.", gambar: "https://images.unsplash.com/photo-1605901309584-818e25960a8f?auto=format&fit=crop&q=80&w=400" },
            { id: 2, nama_produk: "GTA San Andreas Definitive", kategori: "game", harga_sewa: 25000, stok: 5, deskripsi: "Nikmati petualangan Carl Johnson di Los Santos dengan grafis yang ditingkatkan dan kontrol ala GTA V.", gambar: "https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=400" },
            { id: 3, nama_produk: "FL Studio Mobile", kategori: "android", harga_sewa: 30000, stok: 12, deskripsi: "Buat dan simpan proyek musik multi-track lengkap di ponsel atau tablet Android Anda.", gambar: "https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?auto=format&fit=crop&q=80&w=400" },
            { id: 4, nama_produk: "Adobe Lightroom Premium", kategori: "android", harga_sewa: 20000, stok: 20, deskripsi: "Aplikasi editor foto tangguh dengan preset premium, healing brush, dan kontrol warna presisi.", gambar: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&q=80&w=400" },
            { id: 5, nama_produk: "Stardew Valley", kategori: "game", harga_sewa: 12000, stok: 3, deskripsi: "Bangun perkebunan impian Anda, pelihara hewan, bersosialisasi dengan penduduk desa, dan selidiki misteri lembah.", gambar: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?auto=format&fit=crop&q=80&w=400" },
            { id: 6, nama_produk: "Nova Launcher Prime", kategori: "android", harga_sewa: 8000, stok: 15, deskripsi: "Kustomisasi layar beranda Android Anda tanpa batas dengan gestures, efek transisi, dan icon pack.", gambar: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&q=80&w=400" }
        ];

        if (!localStorage.getItem('rentopia_products')) {
            localStorage.setItem('rentopia_products', JSON.stringify(initialProducts));
        }
        if (!localStorage.getItem('rentopia_cart')) {
            localStorage.setItem('rentopia_cart', JSON.stringify([]));
        }
        if (!localStorage.getItem('rentopia_rentals')) {
            localStorage.setItem('rentopia_rentals', JSON.stringify([]));
        }

        // Show registration success toast if navigated from register.html
        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('registered') === 'success') {
                showToast("Pendaftaran berhasil! Silakan masuk ke akun Anda.", "success");
            }
            if (urlParams.get('logout') === 'success') {
                showToast("Anda telah keluar dari sistem.", "info");
            }
        });

        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const borderColors = {
                success: 'border-l-emerald-500 border-emerald-100',
                info: 'border-l-blue-500 border-blue-100',
                error: 'border-l-red-500 border-red-100'
            };
            const bgIcons = {
                success: '<svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
                info: '<svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
                error: '<svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>'
            };
            const bgIconCircle = {
                success: 'bg-emerald-100',
                info: 'bg-blue-100',
                error: 'bg-red-100'
            };

            toast.className = `flex items-center gap-3 bg-white text-gray-800 px-6 py-4 rounded-xl shadow-xl border border-l-4 ${borderColors[type]} mb-3 transition-all duration-300 opacity-0 transform translate-y-[-10px]`;
            toast.style.animation = 'slide-in 0.3s ease-out forwards';
            toast.innerHTML = `
                <div class="w-8 h-8 ${bgIconCircle[type]} rounded-full flex items-center justify-center shrink-0">
                    ${bgIcons[type]}
                </div>
                <span class="font-medium text-sm">${message}</span>
                <button type="button" class="ml-2 text-gray-400 hover:text-gray-600 transition" onclick="this.parentElement.remove()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '1';
            }, 50);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = 'all 0.3s ease-out';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // Toggle Role Menu
        const toggleBtn = document.getElementById('role-toggle-btn');
        const roleMenu = document.getElementById('role-menu');

        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            roleMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            roleMenu.classList.add('hidden');
        });

        window.selectRole = function(role) {
            document.getElementById('login-role').value = role;
            roleMenu.classList.add('hidden');
            const roleName = role === 'admin' ? 'Admin' : 'Penyewa';
            showToast(`Mode Masuk diubah ke: ${roleName}`, "info");
        };

        // Form Submit
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnText = document.getElementById('btn-text');
            const btnSubmit = document.getElementById('btn-submit');
            const role = document.getElementById('login-role').value;
            const email = document.getElementById('email').value;

            btnText.innerHTML = "Memproses...";
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-75', 'cursor-not-allowed');

            setTimeout(() => {
                let user = { name: "John Doe", role: "pembeli" };
                if (role === 'admin') {
                    user = { name: "Admin Rentopia", role: "admin" };
                } else {
                    // Extract name from email as mock
                    const namePart = email.split('@')[0];
                    user.name = namePart.charAt(0).toUpperCase() + namePart.slice(1);
                }
                localStorage.setItem('rentopia_user', JSON.stringify(user));

                if (role === 'admin') {
                    window.location.href = "admin-dashboard.html";
                } else {
                    window.location.href = "landing.html";
                }
            }, 1000);
        });
    </script>
</body>
</html>
